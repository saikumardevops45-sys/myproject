<!DOCTYPE html>
<html>
<head>
    <title>Amazon Clone</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
        }

        .navbar {
            background-color: #131921;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: orange;
        }

        .search-bar input {
            width: 400px;
            padding: 8px;
        }

        .hero {
            background-color: #e3e6e6;
            padding: 30px;
            text-align: center;
        }

        .products {
            display: flex;
            justify-content: space-around;
            margin: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            width: 200px;
            text-align: center;
            border-radius: 5px;
        }

        button {
            background-color: #ffd814;
            border: none;
            padding: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #f7ca00;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">amazon</div>
        <div class="search-bar">
            <input type="text" placeholder="Search Amazon">
        </div>
        <div>Account | Cart</div>
    </div>

    <div class="hero">
        <h2>Welcome to Amazon Clone</h2>
        <p>Shop from millions of products</p>
    </div>

    <div class="products">
        <div class="product">
            <h3>Smartphone</h3>
            <p>₹19,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <h3>Laptop</h3>
            <p>₹55,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <h3>Headphones</h3>
            <p>₹1,499</p>
            <button>Add to Cart</button>
        </div>
    </div>

</body>
</html>
